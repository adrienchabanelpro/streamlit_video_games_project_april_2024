stages:
  train:
    cmd: python scripts/train_model.py
    deps:
      - data/Ventes_jeux_video_final.csv
      - scripts/train_model.py
    outs:
      - reports/model_v2_optuna.txt
      - models/model_v2_xgboost.json
      - models/model_v2_catboost.cbm
      - models/scaler_v2.joblib
      - models/target_encoder_v2.joblib
      - models/feature_means_v2.joblib
      - reports/training_log.json
    plots:
      - reports/shap_summary.png
      - reports/shap_bar.png
